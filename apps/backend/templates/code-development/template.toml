relative_path = "docs/ARCHITECTURE.md"
content = """# 架构说明

## 设计决策

### 为什么选择标准库为主
TaskFlow 定位为轻量工具，不引入外部依赖可以降低部署成本。当需要高级功能（如异步执行、分布式调度）时，再通过可选依赖扩展。

### 任务定义接口
使用 `dataclass` 定义 Task，保持类型安全的同时代码简洁。`func` 字段接受任意 Callable，支持函数、lambda、类方法等多种形式。

### 执行模型（当前）
当前版本采用串行执行模型，按注册顺序依次运行。后续版本计划引入拓扑排序实现依赖驱动执行，并支持线程池并行。

## 模块职责

| 模块 | 职责 |
|------|------|
| `core.py` | 任务定义、依赖解析、执行调度 |
| `utils.py` | 日志配置、路径处理、JSON 读写 |

## 扩展方向

1. **并行执行**：引入 `concurrent.futures` 实现线程池并行
2. **可视化**：生成任务依赖图（Mermaid / Graphviz）
3. **持久化**：支持将任务流定义导出为 YAML/JSON，支持断点续执行
"""

