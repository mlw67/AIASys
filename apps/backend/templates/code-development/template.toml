content = """# TaskFlow — 任务流管理工具

## 项目说明

TaskFlow 是一个轻量级的任务流管理工具，用于定义、执行和监控线性任务管道。本项目为示例项目，展示了一个典型 Python 工具库的结构。

## 项目目标
- 提供声明式任务流定义接口
- 支持任务依赖解析和并行执行
- 提供执行状态监控和日志输出

## 技术栈
- Python 3.12+
- 标准库为主（logging、json、pathlib）
- pytest 用于单元测试

## 目录结构

```
.
├── src/              # 源代码
│   └── taskflow/
│       ├── __init__.py
│       ├── core.py       # 核心引擎
│       └── utils.py      # 工具函数
├── tests/            # 测试
│   └── test_utils.py
├── docs/             # 文档
│   └── ARCHITECTURE.md
└── README.md
```

## 运行方式

```bash
# 安装依赖
pip install -e .

# 运行测试
pytest tests/

# 使用示例
python -c "from src.taskflow.utils import setup_logger; setup_logger('demo')"
```

## 待办事项
- [ ] 实现任务依赖图解析
- [ ] 添加并行执行支持
- [ ] 完善异常处理机制
- [ ] 编写用户文档

"""

