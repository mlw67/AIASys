content = """
'TaskFlow 工具模块.'''

import logging
import sys
from pathlib import Path


def setup_logger(name: str, level: int = logging.INFO) -> logging.Logger:
    '''配置结构化日志记录器.

    Args:
        name: 日志记录器名称.
        level: 日志级别，默认 INFO.

    Returns:
        配置好的日志记录器实例.
    '''
    logger = logging.getLogger(name)
    logger.setLevel(level)

    if not logger.handlers:
        handler = logging.StreamHandler(sys.stdout)
        formatter = logging.Formatter(
            "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
        )
        handler.setFormatter(formatter)
        logger.addHandler(handler)

    return logger


def ensure_dir(path: str | Path) -> Path:
    '''确保目录存在，不存在则创建.

    Args:
        path: 目录路径.

    Returns:
        目录的 Path 对象.
    '''
    p = Path(path)
    p.mkdir(parents=True, exist_ok=True)
    return p


def load_json(path: str | Path) -> dict:
    '''安全加载 JSON 文件.

    Args:
        path: JSON 文件路径.

    Returns:
        解析后的字典，文件不存在时返回空字典.
    '''
    import json

    p = Path(path)
    if not p.exists():
        return {}
    with p.open("r", encoding="utf-8") as f:
        return json.load(f)
"""

[[files]]
relative_path = "src/taskflow/core.py"
content = """
'TaskFlow 核心引擎.

负责任务依赖解析和执行调度。
'''

from __future__ import annotations

from dataclasses import dataclass, field
from typing import Callable


@dataclass
class Task:
    '''单个任务节点.'''

    name: str
    func: Callable
    deps: list[str] = field(default_factory=list)
    retries: int = 0

    def run(self, context: dict) -> dict:
        '''执行任务并返回更新后的上下文.'''
        result = self.func(context)
        if result is not None:
            context.update(result)
        return context


class TaskFlow:
    '''任务流引擎.'''

    def __init__(self) -> None:
        self.tasks: dict[str, Task] = {}

    def add(self, name: str, func: Callable, deps: list[str] | None = None) -> None:
        '''添加任务.'''
        self.tasks[name] = Task(name=name, func=func, deps=deps or [])

    def run(self, initial_context: dict | None = None) -> dict:
        '''执行完整任务流（目前按注册顺序串行执行）.'''
        context = initial_context or {}
        for task in self.tasks.values():
            context = task.run(context)
        return context
"""

[[files]]
relative_path = "tests/test_utils.py"
content = """
'TaskFlow 工具模块测试.'''

import json
import tempfile
from pathlib import Path

from src.taskflow.utils import ensure_dir, load_json, setup_logger


def test_setup_logger_returns_logger():
    '''setup_logger 应返回配置好的 Logger 实例.'''
    logger = setup_logger("test_logger")
    assert logger.name == "test_logger"
    assert logger.level == 20  # INFO


def test_ensure_dir_creates_missing_directory():
    '''ensure_dir 应在目录不存在时创建.'''
    with tempfile.TemporaryDirectory() as tmp:
        target = Path(tmp) / "nested" / "dir"
        result = ensure_dir(target)
        assert result.exists()
        assert result.is_dir()


def test_load_json_reads_existing_file():
    '''load_json 应正确读取现有 JSON 文件.'''
    with tempfile.TemporaryDirectory() as tmp:
        path = Path(tmp) / "data.json"
        path.write_text(json.dumps({"key": "value"}), encoding="utf-8")
        data = load_json(path)
        assert data == {"key": "value"}


def test_load_json_returns_empty_for_missing_file():
    '''load_json 在文件不存在时应返回空字典.'''
    with tempfile.TemporaryDirectory() as tmp:
        path = Path(tmp) / "missing.json"
        data = load_json(path)
        assert data == {}
"""

