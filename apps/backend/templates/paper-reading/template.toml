content = """# 论文笔记模板

## 基本信息

- **编号**：P001
- **标题**：An Image is Worth 16x16 Words: Transformers for Image Recognition at Scale
- **作者**：Alexey Dosovitskiy, Lucas Beyer, Alexander Kolesnikov, et al.
- **年份**：2021
- **会议/期刊**：ICLR
- **领域**：计算机视觉 / 深度学习
- **PDF 路径**：`papers/dosovitskiy2021vit.pdf`

## 核心贡献

1. 首次将纯 Transformer 架构（无卷积、无循环）应用于图像分类任务，提出了 Vision Transformer（ViT）
2. 证明了当在大规模数据集（如 ImageNet-21k, JFT-300M）上预训练时，ViT 可以达到或超过 ResNet 等 CNN 基线的性能
3. 揭示了"大规模预训练 + 迁移学习"对于 Transformer 在视觉任务中的关键作用

## 方法概述

### 核心思想
将图像切分为固定大小的 patches（如 16x16），每个 patch 展平后通过线性投影得到 patch embedding，然后像处理 NLP 中的词序列一样，将 patch 序列输入标准 Transformer Encoder。

### 关键设计
- **Patch Embedding**：图像 224x224 → 切分为 14x14 个 16x16 patch → 每个 patch 展平为 768 维向量
- **Class Token**：在 patch 序列前添加一个可学习的 [CLS] token，用于聚合全局信息进行分类
- **Position Embedding**：1D 可学习的位置编码，直接加到 patch embedding 上
- **Transformer Encoder**：标准结构，包含 Multi-Head Self-Attention (MSA) 和 MLP Block

### 模型变体
| 模型 | Patch 大小 | 层数 | 隐藏维度 | 参数量 |
|------|-----------|------|----------|--------|
| ViT-Base | 16x16 | 12 | 768 | 86M |
| ViT-Large | 16x16 | 24 | 1024 | 307M |
| ViT-Huge | 14x14 | 32 | 1280 | 632M |

## 实验结果

### 主要结论
- 在 ImageNet 上，ViT-Huge 达到 88.55% top-1 accuracy，超过 BiT-L（ResNet152x4，87.54%）
- 在中等规模数据集（ImageNet-1k）上直接训练，ViT 不如 ResNet（需要更多正则化）
- 在大规模数据集上预训练后迁移到下游任务，ViT 展现出更好的扩展性

### 消融实验
- **混合架构（Hybrid）**：将 ResNet 提取的特征图作为 Transformer 的输入序列，性能略优于纯 ViT
- **位置编码**：2D 感知的位置编码效果与 1D 相当，说明 Transformer 可以自行学习空间关系
- ** patch 大小**：较小的 patch（如 8x8）增加计算量但提升精度

## 我的理解

### 优点
- 简洁统一：一套架构同时适用于 NLP 和 CV，降低了多模态融合的技术壁垒
- 可扩展性强：随着数据量和模型规模的增加，性能持续提升（符合 scaling law）

### 局限性
- **数据饥饿**：需要大规模预训练数据才能发挥优势，小数据集上不如 CNN
- **局部特征弱**：自注意力是全局的，对局部纹理的建模不如卷积的归纳偏置
- **计算成本高**：全局注意力的 O(n²) 复杂度在高清图像上很昂贵

### 与我的工作关联
本文是后续所有视觉 Transformer 工作的基础。对于医学影像分析，关键在于如何在数据稀缺的情况下利用 ViT 的表示能力（如结合自监督预训练、知识蒸馏等）。

## 待确认问题

- [ ] ViT 的位置编码对医学影像中的病灶定位有何影响？
- [ ] 医学影像的 3D 特性如何适配 2D patch 的设计？
- [ ] 是否有更高效的注意力机制（如窗口注意力、稀疏注意力）在医学影像上验证过？

## 关联论文

- Swin Transformer (Liu et al., 2021)：引入窗口注意力和层次化特征图，解决 ViT 计算效率问题
- DeiT (Touvron et al., 2021)：用知识蒸馏在 ImageNet-1k 上训练 ViT，降低数据需求
"""

