## 研究主题

探索 Transformer 架构（特别是 Vision Transformer, ViT）在医学影像分割、分类和病灶检测任务中的应用现状和挑战。

## 论文列表

| 编号 | 标题 | 作者 | 年份 | 会议/期刊 | 状态 |
|------|------|------|------|-----------|------|
| P001 | An Image is Worth 16x16 Words | Dosovitskiy et al. | 2021 | ICLR | 已精读 |
| P002 | Swin Transformer | Liu et al. | 2021 | ICCV | 已精读 |
| P003 | UNETR | Hatamizadeh et al. | 2022 | MICCAI | 待阅读 |
| P004 | MedSAM | Ma & Wang | 2023 | arXiv | 待阅读 |

## 核心发现

- ViT 在医学影像分类上已接近或超过 CNN 基线，但在小样本场景下仍有差距
- 自注意力机制可以捕获长距离依赖，对病灶分割有帮助
- 医学影像的数据稀缺性仍是主要挑战，需要结合迁移学习和数据增强

## 待解决问题

- [ ] 小样本医学影像如何有效预训练？
- [ ] 3D 医学影像的 Transformer 计算效率问题
- [ ] 多模态融合（CT + MRI + 病理）的注意力机制设计

---

*以上论文信息为示例，请替换为你实际研究的论文。*
"""

