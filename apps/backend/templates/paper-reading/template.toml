content = """# 文献综述：视觉 Transformer 在医学影像中的应用

## 研究背景

卷积神经网络（CNN）长期主导医学影像分析领域，但其感受野有限、难以建模长距离依赖。Transformer 架构凭借其全局自注意力机制，为医学影像分析带来了新的可能性。

## 方法对比

| 论文 | 核心方法 | 医学任务 | 数据集 | 主要结论 |
|------|----------|----------|--------|----------|
| ViT (Dosovitskiy, 2021) | 纯 Transformer 图像分类 | 分类 | ImageNet | 大规模预训练下性能优异 |
| Swin (Liu, 2021) | 窗口注意力 + 层次化 | 分割 | 多项 | 计算效率高，适合高分辨率影像 |
| UNETR (Hatamizadeh, 2022) | Transformer Encoder + CNN Decoder | 3D 分割 | BTCV | 3D 医学影像分割新基线 |
| MedSAM (Ma, 2023) | 分割一切模型微调 | 通用分割 | 多模态 | 零样本泛化能力强 |

## 共同挑战

1. **数据稀缺**：医学影像标注成本高，难以达到自然图像的预训练规模
2. **计算资源**：高分辨率 3D 影像的全局注意力计算量巨大
3. **可解释性**：注意力图的可视化在医学诊断中至关重要，但 Transformer 的可解释性不如 CNN
4. **多模态融合**：如何有效融合 CT、MRI、病理切片等不同模态的信息

## 未来方向

- 结合自监督学习降低对标注数据的依赖
- 设计针对 3D 医学影像的高效注意力机制
- 将大语言模型（LLM）与视觉 Transformer 结合，实现医学影像的自动报告生成

---

*以上为示例综述框架，请根据你实际阅读的论文填充内容。*
"""

